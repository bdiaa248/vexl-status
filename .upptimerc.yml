# 🌐 VEXL Nova Status Configuration
owner: bdiaa248
repo: vexl-status
cname: status.vexl-gis.tech

sites:
  - name: 🚀 VEXL Backend API
    url: https://vexl-api.up.railway.app/health
    method: GET
    expectStatus: 200

  - name: 🌐 VEXL Official Website
    url: https://www.vexl-gis.tech
    method: GET
    expectStatus: 200

status-page:
  title: VEXL Nova System Status
  description: Official real-time monitoring of VEXL's Spatial Intelligence infrastructure.
  theme: dark
  logoUrl: https://www.vexl-gis.tech/logo.png
  
  navbar:
    - title: Status
      href: /
    - title: Workspace
      href: https://nova.vexl-gis.tech
    - title: Website
      href: https://www.vexl-gis.tech

workflowSchedule:
  uptime: "*/5 * * * *" # تشييك كل 5 دقائق
  graphs: "0 0 * * *"
  staticSite: "0 1 * * *"
  summary: "0 2 * * *"
