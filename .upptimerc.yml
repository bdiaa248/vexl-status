# 🧠 VEXL NOVA - SYSTEM STATUS CONFIGURATION
owner: bdiaa248
repo: vexl-status

# الدومين الاحترافي الخاص بك
cname: status.vexl-gis.tech
 
# السيرفرات والمواقع اللي بنراقبها
sites:
  - name: 🚀 VEXL Backend API
    url: https://vexl-api.up.railway.app/health
    method: GET
    expectStatus: 200
  
  - name: 🌐 VEXL Official Website
    url: https://www.vexl-gis.tech
    method: GET
    expectStatus: 200

# إعدادات شكل صفحة الحالة (البراندينج)
status-website:
  title: VEXL Nova Status
  description: Official real-time monitoring for VEXL's Spatial Intelligence infrastructure.
  theme: dark
  logoUrl: https://www.vexl-gis.tech/logo.png
  faviconUrl: https://www.vexl-gis.tech/favicon.ico
  
# التوقيت (فحص كل 5 دقائق)
workflowSchedule:
  uptime: "*/5 * * * *"
  graphs: "0 0 * * *"
  staticSite: "0 1 * * *"
  summary: "0 2 * * *"
