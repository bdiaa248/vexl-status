# 🧠 VEXL STATUS CONFIGURATION 
owner: bdiaa248
repo: vexl-status

cname: status.vexl-gis.tech
 
sites:
  - name: 🚀 VEXL Backend API
    url: https://vexl-website-production.up.railway.app/health
    method: GET
    expectStatus: 200
  
  - name: 🌐 VEXL Official Website
    url: https://www.vexl-gis.tech
    method: GET
    expectStatus: 200

# التخصيص الاحترافي للواجهة
status-website:
  name: VEXL
  theme: night
  introTitle: "**VEXL** System Status"
  introMessage: |
    <img src="https://raw.githubusercontent.com/bdiaa248/vexl-status/master/assets/status-banner.png" width="500" style="display: block; margin: 0 auto 20px auto; border-radius: 12px;">

    Official real-time monitoring for **VEXL's** Spatial Intelligence infrastructure.
    
    *نحن نراقب أداء الأنظمة لضمان استمرارية الابتكار المكاني.*
  
  logoUrl: https://www.vexl-gis.tech/logo.png
  faviconUrl: https://www.vexl-gis.tech/favicon.svg
  
  navbar:
    - title: Status
      href: /
    - title: Workspace
      href: https://vexl-gis.tech/nova-workspace
    - title: Main Site
      href: https://www.vexl-gis.tech


workflowSchedule:
  uptime: "*/5 * * * *"
  graphs: "0 0 * * *"
  staticSite: "0 1 * * *"
  summary: "0 2 * * *"
